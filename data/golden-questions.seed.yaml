# Golden-Questions-Seed für Retrieval-Evaluierung
#
# GROUNDING-PRINZIP (NICHT verhandelbar):
# Golden Questions dienen der Evaluierung der RETRIEVAL-QUALITÄT, nicht als fachliche Fakten-Datenbank.
# Die `query` ist eine neutrale Retrieval-Anfrage, abgeleitet aus einem im Lehrplan explizit benannten Kompetenzbereich.
# KEINE erfundenen curricularen Aussagen oder Antwortinhalte — nur die erwartete QUELLE ist bekannt.
# Konkrete Antwortinhalte werden von Fachexperten validiert (EVALUATION_PLAN.md).
#
# Status-Konventionen:
#   - "active": expected_source_ids nicht leer, Quellen in der Registry und status="candidate" oder "registered"
#   - "blocked-source-not-approved": Quellen existieren in Registry (z.B. src-027/028), aber noch status="candidate" + license_verified=false
#   - "blocked-no-registered-source": Kein Datensatz für diese Konfession/Fach vorhanden
#
# Letzte Aktualisierung: 2026-06-26
# Bezug: docs/rag/EVALUATION_PLAN.md, data/source-registry.seed.yaml

golden_questions:
  # =============================================================================
