    query: "Welche Anforderungen stellt der Lehrplan an die mündliche Kommunikation und Sprechfähigkeit in den Klassen 5–10?"
    expected_source_ids: ["src-001"]
    expected_section: "zu verifizieren gegen Lehrplan Sprechen-Abschnitt"
    rationale: "Der Lehrplan src-001 definiert explizite Kompetenzen für Sprechen; Retrieval sollte diesen Abschnitt finden."
    status: "active"

