#   → Maintainer-Issue: kath. Fachlehrpläne separat beschaffen und als src-022+ aufnehmen.
# - Ethikunterricht Sekundarschule/Gymnasium: Fachlehrpläne analog verifizieren und ergänzen.
# - Gymnasium Religion ev. neue Fassung ab 1.8.2022 (gemäß RdErl src-005): direktes PDF
#   verifizieren und ggf. src-004 ersetzen/ergänzen.
# - Alle Lizenzangaben sind unverifiziert (license_verified: false). Vor Ingestion pro Quelle
#   Lizenz prüfen und im Feld license_or_terms dokumentieren (ADR 0003 Source-Governance).
