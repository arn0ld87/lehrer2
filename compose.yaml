# Lokale Entwicklungsumgebung — KEINE Produktion, KEINE echten Secrets.
# Werte sind Platzhalter; lokale Geheimnisse via .env ueberschreiben (siehe .env.example).
# Siehe docs/operations/DEVELOPMENT.md.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ua_lsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
      POSTGRES_DB: ${POSTGRES_DB:-ua_lsa}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-locally}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama

  # Separater OCR-/Extraktions-Worker — Platzhalter, bis App-Code existiert.
  # ocr-worker:
  #   build: ./services/ocr-worker
  #   depends_on: [redis, minio]

volumes:
  pgdata:
  qdrantdata:
  miniodata:
  ollamadata:
