name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    name: Doku-Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:docs

  format:
    name: Format-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm run test
      - run: node scripts/check-schema-drift.mjs
      - name: Migrations-Review-Flag (DELETE/UPDATE)
        run: |
          if git diff --name-only origin/main... | grep -q '^drizzle/.*\.sql$'; then
            if grep -RInE '\b(DELETE|UPDATE)\b' drizzle/*.sql; then
              echo "::warning::Migration enthält DELETE/UPDATE — manuelles Review erforderlich (ADR 0005)."
            fi
          fi
