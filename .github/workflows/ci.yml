name: CI

# Hinweis: Es existiert noch KEINE Anwendung. Diese CI prueft ausschliesslich
# Dokumentation und Formatierung. App-Build-, Test-, Lint- und Typecheck-Jobs
# werden erst ergaenzt, wenn App-Code existiert (siehe docs/operations/CI_CD.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    name: Doku-Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run verify:docs

  format:
    name: Format-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run format:check
