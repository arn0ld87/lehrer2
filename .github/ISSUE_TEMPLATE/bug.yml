name: Bug
description: Fehlverhalten melden
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Beschreibung
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduktion
      value: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes vs. tatsaechliches Verhalten
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Umgebung
      description: Version, Browser/OS, Provider-Konfiguration (KEINE Secrets, KEINE personenbezogenen Daten)
